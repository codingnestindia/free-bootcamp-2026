<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Article Summarizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .container {
      width: 500px;
      max-width: 100%;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: none;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      background: #4CAF50;
      color: white;
      cursor: pointer;
      border: none;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    button:disabled {
      background: #9e9e9e;
      cursor: not-allowed;
    }

    .copy-btn {
      background: #2196F3;
    }

    .output {
      margin-top: 15px;
      padding: 10px;
      background: #f1f1f1;
      border-radius: 8px;
      min-height: 80px;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.6;
    }

    .loading {

      text-align: center;
      font-size: 14px;
      color: gray;
      margin-top: 10px;
    }

    .api-hint {
      font-size: 11px;
      color: #888;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>AI Article Summarizer</h2>

  <textarea id="inputText" placeholder="Paste your article here..."></textarea>


  <select id="summaryType">
    <option value="short">Short Summary</option>
    <option value="medium">Medium Summary</option>
    <option value="detailed">Detailed Summary</option>
  </select>

  <button id="generateBtn" onclick="generateSummary()">Generate Summary</button>

  <div id="loading" class="loading"></div>

  <div id="output" class="output"></div>

  <button class="copy-btn" onclick="copyText()">Copy Summary</button>
  <p class="api-hint" id="apiHint"></p>
</div>

<script>
  const POLLINATIONS_API = "https://gen.pollinations.ai/v1/chat/completions";
  const CORS_PROXIES = [
    "https://corsproxy.io/?url=",
    "https://api.cors.lol/?url="
  ];

  const instructions = {
    short: "Summarize the following article in 2-3 concise lines.",
    medium: "Summarize the following article in 5 clear bullet points.",
    detailed: "Provide a detailed 10-12 line summary of the following article."
  };

  async function generateSummary() {
    const text = document.getElementById("inputText").value.trim();
    const type = document.getElementById("summaryType").value;
    const output = document.getElementById("output");
    const loading = document.getElementById("loading");
    const btn = document.getElementById("generateBtn");

    if (!text) return alert("Please paste an article first.");

    loading.innerText = "Generating summary...";
    output.innerText = "";
    btn.disabled = true;

    const apiKey = "DONT_USE_MY_KEY_MAN"
    const body = {
      model: "deepseek",
      messages: [
        { role: "system", content: "You are a helpful article summarizer. Respond only with the summary, no extra commentary." },
        { role: "user", content: instructions[type] + "\n\n" + text }
      ]
    };

    const headers = { "Content-Type": "application/json" };
    if (apiKey) headers["Authorization"] = "Bearer " + apiKey;

    let lastError = "";
    for (const proxy of CORS_PROXIES) {
      try {
        const url = proxy + encodeURIComponent(POLLINATIONS_API);
        const res = await fetch(url, {
          method: "POST",
          headers,
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          lastError = `HTTP ${res.status}: ${await res.text()}`;
          continue;
        }

        const data = await res.json();
        const summary = data.choices?.[0]?.message?.content;

        if (summary) {
          output.innerText = summary;
          loading.innerText = "";
          btn.disabled = false;
          return;
        }
      } catch (e) {
        lastError = e.message;
        continue;
      }
    }

    loading.innerText = "";
    btn.disabled = false;
    output.innerText =
      "didnt work"
  }

  function copyText() {
    const text = document.getElementById("output").innerText;
    if (!text || text.startsWith("⚠️")) return alert("Nothing to copy yet!");
    navigator.clipboard.writeText(text).then(() => alert("Copied!"));
  }
</script>
</body>

</html>

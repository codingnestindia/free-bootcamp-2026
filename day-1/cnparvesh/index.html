<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Finance Dashboard</title>
    <link rel="stylesheet" href="styles.css" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
  </head>

  <body>
    <div class="container py-4">
      <!-- Header section -->
      <div class="d-flex align-items-center mb-4">
        <div class="header-icon me-3">
          <i class="bi bi-wallet2"></i>
        </div>

        <div>
          <h4>Personal Finance Dashboard</h4>
          <p>Track your expenses and visualize spending</p>
        </div>
      </div>

      <!-- Cards SEction -->
      <div class="row g-4 mb-4">
        <div class="col-md-3">
          <div class="card Cards p-3">
            <div class="d-flex align-items-center">
              <div class="card-icon icon-blue me-3">
                <i class="bi bi-currency-dollar"></i>
              </div>

              <div>
                <p class="text-muted">Total Spending</p>
                <h5 class="fw-bold" id="totalSpending">₹0</h5>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card stat-card p-3">
            <div class="d-flex align-items-center">
              <div class="card-icon icon-green me-3">
                <i class="bi bi-calendar"></i>
              </div>

              <div>
                <p class="text-muted">This Month</p>
                <h5 class="fw-bold" id="monthSpending">₹0</h5>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card stat-card p-3">
            <div class="d-flex align-items-center">
              <div class="card-icon icon-purple me-3">
                <i class="bi bi-graph-up"></i>
              </div>

              <div>
                <p class="text-muted">Avg. Transaction</p>
                <h5 class="fw-bold" id="avgTransaction">₹0</h5>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card stat-card p-3">
            <div class="d-flex align-items-center">
              <div class="card-icon icon-orange me-3">
                <i class="bi bi-credit-card"></i>
              </div>

              <div>
                <p class="text-muted">Transactions</p>
                <h5 class="fw-bold" id="totalTransactions">0</h5>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <div class="col">
          <div class="card p-4">
            <h4 class="mb-3">Add New Expense</h4>
            <div class="mb-3">
              <label>Description</label>
              <input
                type="text"
                id="description"
                class="form-control"
                placeholder="e.g., Grocery shopping"
              />
            </div>

            <div class="mb-3">
              <label>Amount (₹)</label>
              <input
                type="number"
                id="amount"
                class="form-control"
                placeholder="0.00"
              />
            </div>

            <div class="mb-3">
              <label>Category</label>

              <select class="form-select" id="category">
                <option value="travel">Travel</option>
                <option value="food">Food</option>
                <option value="shopping">Shopping</option>
                <option value="bills">Bills</option>
                <option value="entertainment">Entertainment</option>
                <option value="other">Other</option>
              </select>
            </div>

            <button id="addExpenseBtn" class="btn btn-gradient w-100">
              <i class="bi bi-plus-circle me-2"></i>
              Add Expense
            </button>
          </div>
        </div>

        <div class="col-md-8">
          <div class="card">
            <div class="p-3 border-bottom">
              <h5 class="fw-bold mb-0">Transaction History</h5>
              <p class="text-muted" id="transactionCount">0 transactions</p>
            </div>

            <table class="table mb-0">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Date</th>
                  <th>Description</th>
                  <th>Category</th>
                  <th>Amount</th>
                  <th>Action</th>
                </tr>
              </thead>

              <tbody id="transactionTable"></tbody>
            </table>
          </div>
        </div>
      </div>
      <!-- chart SEction -->
      <div class="card mt-4 p-4">
  <h5 class="fw-bold mb-3">Expense Chart</h5>
  <canvas id="expenseChart"></canvas>
</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>

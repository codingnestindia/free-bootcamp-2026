<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Day-1 Assignment</title>
        <link rel="stylesheet" href="style.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
            crossorigin="anonymous" />
    </head>
    <div>
        <!--header-->
        <header class="py-3 border-bottom bg-white box-shadow">
            <div class="container d-flex align-items-center gap-3">
                <div class="bg-clr text-white p-2 rounded">
                    <i class="fa-solid fa-wallet"></i>
                </div>
                <div class="justify-content-start">
                    <h1 class="mb-0">Personal Finance Dashboard</h1>
                    <p class="text-muted">
                        Track your expenses and visualize spending
                    </p>
                </div>
            </div>
        </header>
        <!--stats card-->
        <section class="container mt-4">

  <div class="row g-3">

    <!-- Card 1 -->
    <div class="col-lg-3 col-md-6 col-12">
      <div class="card shadow-sm">
        <div class="card-body d-flex align-items-center gap-3 py-5">
   <div class=" fs-3 fw-bold bg-light px-2 py-1 rounded">
                    <i class=" fa-solid text-primary  fa-dollar-sign "></i>
                </div>       

          <div>
            <p class="text-muted mb-1">Total Spending</p>
            <span id="totalspend">₹0</span>
          </div>

        </div>
      </div>
    </div>
    <!-- Card 2 -->
    <div class="col-lg-3 col-md-6 col-12">
      <div class="card shadow-sm">
        <div class="card-body d-flex align-items-center gap-3 py-5">
<div class="text-success fs-3 fw-bold bg-light px-2 py-1 rounded">
                    <i class="fa-regular fa-calendar"></i>
                </div>
          <div>
            <p class="text-muted mb-1">This Month</p>
            <span id="monthlyspend">₹0</span>
          </div>

        </div>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="col-lg-3 col-md-6 col-12">
      <div class="card shadow-sm">
        <div class="card-body d-flex align-items-center gap-3 py-5">

           <div class="card-purple fs-3 fw-bold bg-light px-2 py-1 rounded">
                    <i class="fa-solid fa-arrow-trend-up"></i>
                </div>

          <div>
            <p class="text-muted mb-1">Avg Transaction</p>
            <span id="Avgtransaction">₹0</span>
          </div>

        </div>
      </div>
    </div>

    <!-- Card 4 -->
    <div class="col-lg-3 col-md-6 col-12">
      <div class="card shadow-sm">
        <div class="card-body d-flex align-items-center gap-3 py-5">

          <div class="text-danger fs-3 fw-bold bg-light px-2 py-1 rounded">
                    <i class="fa-regular fa-credit-card"></i>
                </div>

          <div>
            <p class="text-muted mb-1">Transactions</p>
            <span id="transaction">0</span>
            
          </div>

        </div>
      </div>
    </div>

  </div>

</section>
<!--form-->
<div class="container mt-4">
<div class="row g-4">
    <!-- FORM CARD -->
      <div class="col-lg-4 col-12">
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-4">
            <h5 class="mb-4">Add New Expense</h5>

            <form id="expenseform" action="">
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <input id="descInput" type="text" class="form-control"
                    placeholder="e.g. Grocery shopping">
                </div>

                <div class="mb-3">
                    <label class="form-label">Amount($)</label>
                    <input id="amount" type="text" class="form-control"
                    placeholder="e.g. 0.00">
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select id="category" class="form-select">
                        <option selected>Select category</option>
                        <option>Food</option>
                        <option>Travel</option>
                        <option>Shopping</option>
                        <option>Entertainment</option>
                        <option>Bills</option>
                        <option>Healthcare</option>
                        <option>Other</option>
                    </select>
                </div>

                <button type="submit" class="bg-clr text-white w-100 py-2 border-0 rounded fs-5">
                    <i class="me-2 fa-solid fa-plus"></i>Add Expenses
                </button>
            </form>

        </div>
    </div>

    <!-- CHART CARD -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h5 class="mb-3">Spending by Category</h5>
            <canvas id="myChart"></canvas>
        </div>
    </div>

</div>


<!-- RIGHT SIDE -->
<div class="col-lg-8 col-12">

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">

            <h5 class="mb-4">Transaction History</h5>
<table class="table">
<thead>
    <tr>
        <th >Date</th>
        <th>Description</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Action</th>
    </tr>
</thead>
<tbody id="transactionTable"> </tbody>
</table>
        </div>
    </div>

</div>

</div>
</div>


        </main>
     <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

    </body>
</html>

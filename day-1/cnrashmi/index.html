<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">  -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--header section-->
   <header>
      <nav class="navbar shadow-sm py-2">
        <div
          class="container d-flex align-items-center justify-content-start gap-1"
        >
          <a class="navbar-brand fs-5 fw-bold" href="#">
            <i class="fa-solid fa-wallet bg-gradient-icon text-white p-2 rounded"></i>
          </a>
          <div class="align-items-center pt-3">
            <h3 class="m-0 fs-4">Personal Finance Dashboard</h3>
            <p class="text-secondary fs-6 lead">
              Track your expenses and visualize spending
            </p>
          </div>
        </div>
      </nav>
    </header>

   
    <!--cards section-->
<section class="container mt-2">
  <div class="row g-3">

    <!-- card 1 -->
    <div class="col-md-3">
      <div class="card shadow-sm border-0">
        <div class="mx-3 mt-3 mb-3 p-3">
          <i class="fa-solid fa-dollar-sign p-2 rounded bg-primary text-white"></i>
        </div>
        <div class="card-body">
          <p class="card-title fs-6 text-secondary">Total Spending </p>
          <h5 class="card-text" id="totalSpending">₹ 00.00</h5>
        </div>
      </div>
    </div>
        
    <!-- card 2 -->
    <div class="col-md-3">
      <div class="card shadow-sm border-0">
      <div class="text-success mb-3">
        <i class="fas fa-calendar-alt"></i>
         </div>
        <div class="card-body">
          <p class="card-title fs-6 text-secondary">This Month</p>
          <h5 class="card-text" id="monthSpending">₹ 00.00</h5>
        </div>
      </div>
    </div>

    <!-- card 3 -->
    <div class="col-md-3">
      <div class="card shadow-sm border-0">
        <div class=" text-purple mb-3 p-2">
           <i class="fas fa-chart-line"></i>
        </div>
        <div class="card-body">
          <p class="card-title fs-6 text-secondary">Avg.Transactiion</p>
          <h5 class="card-text" id="avgTransaction">₹ 00.00</h5>
        </div>
      </div>
    </div>

    <!-- card 4 -->
    <div class="col-md-3">
      <div class="card shadow-sm border-0">
       <div class="icon-circle bg-orange-soft text-orange mb-3">
           <i class="fas fa-credit-card"></i>
        </div>
        <div class="card-body">
          <p class="card-title fs-6 text-secondary">Transactions</p>
          <h5 class="card-text" id="totalTransactions">0</h5>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- Form Side -->
 <div class="row g-4" >
 <div class="col-lg-4">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4">Add New Expense</h5>
                        <form id="expenseForm">
                            <div class="mb-3">
                                <label for="expenseDescription" class="form-label text-muted small fw-bold">Description</label>
                                <input type="text" class="form-control" id="expenseDescription" placeholder="e.g., Grocery shopping" required>
                            </div>
                            <div class="mb-3">
                                <label for="expenseAmount" class="form-label text-muted small fw-bold">Amount (₹)</label>
                                <input type="number" step="0.01" class="form-control" id="expenseAmount" placeholder="0.00" required>
                            </div>
                            <div class="mb-4">
                                <label for="expenseCategory" class="form-label text-muted small fw-bold">Category</label>
                                <select class="form-select" id="expenseCategory" required>
                                    <option value="Food">Food</option>
                                    <option value="Transport">Transport</option>
                                    <option value="Shopping">Shopping</option>
                                    <option value="Entertainment">Entertainment</option>
                                    <option value="Utilities">Utilities</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold gradient-btn">
                                <i class="fas fa-plus-circle me-2"></i> Add Expense
                            </button>
                        </form>
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4">Spending by Category</h5>
                        <div class="chart-container">
                            <canvas id="categoryChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

<!-- Table Side -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <h5 class="fw-bold mb-0">Transaction History</h5>
                        </div>
                        <p class="text-muted small mb-4" id="transactionCount">0 transactions</p>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle" id="transactionsTable">
                                <thead class="table-light">
                                    <tr>
                                        <th class="border-0 text-muted small fw-bold text-uppercase">Date</th>
                                        <th class="border-0 text-muted small fw-bold text-uppercase">Description</th>
                                        <th class="border-0 text-muted small fw-bold text-uppercase">Category</th>
                                        <th class="border-0 text-muted small fw-bold text-uppercase text-end">Amount</th>
                                        <th class="border-0 text-muted small fw-bold text-uppercase text-center">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="transactionsBody">
                                    <!-- Transactions will be added here -->
                                </tbody>
                            </table>
                        </div>

<!-- Empty State -->
                        <div id="emptyState" class="text-center py-5 d-none">
                            <i class="fas fa-receipt fa-3x text-light mb-3"></i>
                            <p class="text-muted">No transactions found</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
</div>

    <!-- Bootstrap & Chart.js JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom JS -->
    <script src="script.js
    "></script>



</body>
</html>

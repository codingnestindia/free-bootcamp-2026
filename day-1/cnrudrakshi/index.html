<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Finance Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body class="bs-body-color">
  <header>
    <nav class="navbar shadow-sm py-2">
      <div class="container d-flex align-items-center justify-content-start gap-1">
        <a class="navbar-brand fs-5 fw-bold" href="#">
          <i class="fa-solid fa-wallet bg-color text-white p-2 rounded-1"></i>
        </a>
        <div class="align-items-center pt-3">
          <h3 class="m-0 fs-4">Personal Finance Dashboard</h3>
          <p class="text-secondary fs-6 lead">
            Track your expenses and visualize spending
          </p>
        </div>
      </div>
    </nav>
  </header>
  <!-- cards -->
  <div class="container mt-5">
    <div class="row">
      <div class="col-sm-3 mb-3 mb-sm-0 ">
        <div class="card p-3">
          <div class="card-body">
            <i class="fa-solid fa-dollar-sign fs-5 text-primary bg-primary-subtle p-2 mb-2 rounded"></i>
            <p>Total Spending</p>
            <div id="spendings"></div>
          </div>
        </div>
      </div>
      <div class="col-sm-3">
        <div class="card p-3">
          <div class="card-body">
            <i class="fa-regular fa-calendar fs-5 text-success bg-success-subtle p-2 mb-2 rounded"></i>
            <p>This Month</p>
            <div id="growth"></div>
          </div>
        </div>
      </div>
      <div class="col-sm-3 mb-3 mb-sm-0">
        <div class="card p-3">
          <div class="card-body">
            <i class="fa-solid fa-arrow-trend-up fs-5 text-info bg-info-subtle p-2 mb-2 rounded"></i>
            <p>Avg. Transaction</p>
            <div id="average"></div>
          </div>
        </div>
      </div>
      <div class="col-sm-3 mb-3 mb-sm-0">
        <div class="card p-3">
          <div class="card-body">
            <i class="fa-regular fa-credit-card fs-5 text-danger bg-danger-subtle p-2 mb-2 rounded"></i>
            <p>Transactions</p>
            <div id="transactions"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- form -->
  <div class=" container mt-3 d-flex gap-4 ">
    <div class="left">
      <form id="form" class="max-width p-4 shadow-sm border rounded-3  bg-white ">
        <p class="fs-5 fw-bold">Add new Expense</p>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <input id="titleInput" type="text" class="form-control" placeholder="e.g., Grocery Shopping">
        </div>
        <div class="mb-3">
          <label class="form-label">Amount()</label>
          <input id="amountInput" type="text" class="form-control" placeholder="0.00">
        </div>
        <div class="mb-3">
          <label class="form-label">Cateogry</label>
          <select id="dropdownSelector" class="form-select" aria-label="Default select example">
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Bills">Bills</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Shopping">Shopping</option>
            <option value="Health Care">Health Care</option>
            <option value="Others">Others</option>
          </select>
        </div>
        <button id="addNewExpense" type="submit" class="btn btn-primary bg-color   border-0 w-100">
          <i class="fa-solid fa-plus border rounded-circle fs-6 p-1"></i>
          Add New Expense</button>
      </form>
      <div class="mt-3 p-4 max-width shadow-sm border rounded-3  bg-white ">
        <h3 class="fs-5 fw-bold">Spending by Category</h3>
        <canvas id="myChart"></canvas>
      </div>
    </div>
    <div class="w-100 border shadow-sm rounded-3 bg-white" style="height: 300px;">
      <div class="header border-bottom">
        <p class="fs-5 fw-bold ms-4 mt-3">Transaction History</p>
       <p id="tableTransactionCount" class="ms-4 text-secondary fs-6"></p>
      </div>

      <table id="table" class="table table-striped table-hover align-middle">
        <thead>
          <tr>
            <th>DATE</th>
            <th>DESCRIPTION</th>
            <th>CATEGORY</th>
            <th>AMOUNT (₹)</th>
            <th>ACTIONS</th>
          </tr>
        </thead>

        <tbody id="expenseBody"></tbody>
      </table>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>

</html>

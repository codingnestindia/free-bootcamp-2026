<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Discovery</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container py-4">
      <!-- header -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-3">
          <div class="logo-box">
            <i class="ri-briefcase-line"></i>
          </div>

          <div>
            <h3 class="title">Job Discovery</h3>
            <p class="subtitle">Find your dream career</p>
          </div>
        </div>

        <button class="bookmark-btn">
          <i class="ri-bookmark-line me-1"></i>
          Bookmarks (0)
        </button>
      </div>

      <!-- Search -->
      <div class="mb-3">
        <div class="search-box d-flex align-items-center gap-2">
          <i class="ri-search-line"></i>
          <input
            type="text"
            class="form-control border-0 shadow-none"
            placeholder="Search jobs..."
          />
        </div>
      </div>

      <div class="d-flex flex-wrap gap-3">
        <div class="filter-box d-flex align-items-center gap-2 flex-grow-1">
          <i class="ri-map-pin-line"></i>
          <input
            type="text"
            class="form-control border-0 shadow-none"
            placeholder="Location..."
          />
        </div>

        <!-- buttons -->
        <div class="d-flex gap-2 flex-wrap">
          <button class="tag-btn active">All</button>
          <button class="tag-btn">Full-time</button>
          <button class="tag-btn">Part-time</button>
          <button class="tag-btn">Contract</button>
          <button class="tag-btn">Remote</button>
        </div>
      </div>

      <div id="job-list" class="row mt-4"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
  </body>
</html>
